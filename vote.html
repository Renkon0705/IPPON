<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>投票</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  position: fixed;
  touch-action: manipulation;
  overscroll-behavior: none;
}

body {
  background: #111;
  color: white;
  font-family: sans-serif;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-align: center;
}

.voteButton {
  width: 160px;
  height: 160px;
  background: yellow;
  border-radius: 50%;
  margin: 40px 0;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(255,255,0,0.9);
  transition: 0.1s;
  touch-action: manipulation;
}

.voteButton:active {
  transform: scale(0.9);
}

#myVotes {
  font-size: 28px;
}

#adminToggle {
  margin-top: 10px;
  padding: 8px 16px;
  background: #222;
  border-radius: 20px;
  cursor: pointer;
}

#resetVotesButton,
#resetAllButton {
  display: none;
  margin-top: 15px;
  padding: 10px 24px;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

#resetVotesButton {
  background: #444;
}

#resetAllButton {
  background: red;
}

@media (max-height: 600px) {
  .voteButton {
    width: 120px;
    height: 120px;
  }

  #myVotes {
    font-size: 20px;
  }
}
</style>
</head>

<body>

<h2>投票</h2>

<div id="myVotes">送信票数：0 / 2</div>

<div class="voteButton" id="voteButton"></div>

<div id="adminToggle">管理者モード：OFF</div>

<button id="resetVotesButton">この端末のリセット</button>
<button id="resetAllButton">IPPONリセット</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, runTransaction, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  authDomain: "ipponsystem-245b4.firebaseapp.com",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ipponsystem-245b4",
  storageBucket: "ipponsystem-245b4.firebasestorage.app",
  messagingSenderId: "1096087322754",
  appId: "1:1096087322754:web:cd18fd1386d05e5c1df49b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const voteRef = ref(db, "votes");

let localVotes = 0;
let isAdmin = false;

const button = document.getElementById("voteButton");
const myVotesDisplay = document.getElementById("myVotes");
const adminToggle = document.getElementById("adminToggle");
const resetVotesButton = document.getElementById("resetVotesButton");
const resetAllButton = document.getElementById("resetAllButton");

function updateDisplay() {
  myVotesDisplay.textContent = `送信票数：${localVotes} / 2`;
}

/* 管理者切替 */
adminToggle.addEventListener("click", () => {
  isAdmin = !isAdmin;
  adminToggle.textContent = `管理者モード：${isAdmin ? "ON" : "OFF"}`;

  const display = isAdmin ? "inline-block" : "none";
  resetVotesButton.style.display = display;
  resetAllButton.style.display = display;
});

/* 投票（連打OK） */
button.addEventListener("click", () => {

  if (localVotes >= 2) return;

  localVotes++;
  updateDisplay();

  if (localVotes === 1) button.style.opacity = "0.6";
  if (localVotes === 2) button.style.opacity = "1";

  runTransaction(voteRef, (current) => {
    return (current || 0) + 1;
  });
});

/* 端末リセット */
resetVotesButton.addEventListener("click", () => {
  localVotes = 0;
  button.style.opacity = "1";
  updateDisplay();
});

/* IPPONリセット */
resetAllButton.addEventListener("click", () => {
  if (confirm("IPPONをリセットする？")) {
    set(voteRef, 0);
    localVotes = 0;
    button.style.opacity = "1";
    updateDisplay();
  }
});

/* 外部リセット検知 */
onValue(voteRef, (snapshot) => {
  const value = snapshot.val() || 0;

  if (value === 0) {
    localVotes = 0;
    button.style.opacity = "1";
    updateDisplay();
  }
});

updateDisplay();

/* ===== ズーム防止（連打邪魔しない版） ===== */

// ピンチズーム防止のみ
document.addEventListener("gesturestart", (e) => {
  e.preventDefault();
});

</script>

</body>
</html>
