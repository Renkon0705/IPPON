<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin-top: 120px; /* 少し下げる */
}

.voteButton {
  width: 120px;     /* ← 大きく */
  height: 120px;    /* ← 大きく */
  background: yellow;
  border-radius: 50%;
  margin: 80px auto 0; /* ← さらに下へ */
  cursor: pointer;
  box-shadow: 0 0 20px rgba(255,255,0,0.7);
  transition: 0.15s;
}

.voteButton:active {
  transform: scale(0.9);
}

#myVotes {
  font-size: 28px;
  margin-top: 20px;
}

#resetVotesButton {
  margin-top: 40px;
  padding: 8px 20px;
  border: none;
  border-radius: 6px;
  background: #444;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>投票</h2>

<div id="myVotes">送信票数：0 / 2</div>

<div class="voteButton" id="voteButton"></div>

<button id="resetVotesButton">リセット</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  authDomain: "ipponsystem-245b4.firebaseapp.com",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ipponsystem-245b4",
  storageBucket: "ipponsystem-245b4.firebasestorage.app",
  messagingSenderId: "1096087322754",
  appId: "1:1096087322754:web:cd18fd1386d05e5c1df49b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const voteRef = ref(db, "votes");

let localVotes = 0;

const button = document.getElementById("voteButton");
const myVotesDisplay = document.getElementById("myVotes");

// 表示更新関数
function updateDisplay() {
  myVotesDisplay.textContent = `送信票数：${localVotes} / 2`;
}

// 2回まで投票
button.addEventListener("click", () => {

  if (localVotes >= 2) return;

  localVotes++;
  updateDisplay();

  if (localVotes === 1) button.style.opacity = "0.6";
  if (localVotes === 2) button.style.opacity = "1";

  runTransaction(voteRef, (current) => {
    return (current || 0) + 1;
  });
});

// この端末だけリセット
document.getElementById("resetVotesButton").addEventListener("click", () => {
  localVotes = 0;
  button.style.opacity = "1";
  updateDisplay();
});

updateDisplay();

</script>

</body>
</html>
