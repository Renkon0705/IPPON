<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>面白い投票</title>
<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin-top: 100px;
}
button {
  font-size: 30px;
  padding: 20px 40px;
  cursor: pointer;
}
#count {
  margin-top: 20px;
  font-size: 20px;
}
</style>
</head>
<body>

<h1>面白い！</h1>
<button onclick="vote()">🔥 押す 🔥</button>
<div id="count">あなたの投票：0 / 2</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  authDomain: "ipponsystem-245b4.firebaseapp.com",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ipponsystem-245b4",
  storageBucket: "ipponsystem-245b4.firebasestorage.app",
  messagingSenderId: "1096087322754",
  appId: "1:1096087322754:web:cd18fd1386d05e5c1df49b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myVotes = 0;
const maxVotes = 2;

window.vote = function() {

  if (myVotes >= maxVotes) {
    return; // 3回以上は無効
  }

  myVotes++;
  document.getElementById("count").textContent =
    "あなたの投票：" + myVotes + " / 2";

  const voteRef = ref(db, "votes");

  runTransaction(voteRef, (current) => {
    return (current || 0) + 1;
  });
};
</script>

</body>
</html>
