<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin-top: 100px;
}

.voteButton {
  width: 60px;
  height: 60px;
  background: yellow;
  border-radius: 50%;
  margin: 0 auto;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(255,255,0,0.6);
  transition: 0.15s;
}

.voteButton:active {
  transform: scale(0.9);
}

#resetVotesButton {
  margin-top: 40px;
  padding: 8px 20px;
  font-size: 14px;
  border: none;
  border-radius: 6px;
  background: #444;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>投票</h2>

<div class="voteButton" id="voteButton" data-votes="0"></div>

<button id="resetVotesButton">リセット</button>

<script>

const button = document.getElementById("voteButton");

// 最大2票
button.addEventListener("click", () => {
  let votes = parseInt(button.dataset.votes);

  if (votes < 2) {
    votes++;
    button.dataset.votes = votes;

    if (votes === 1) button.style.opacity = "0.5";
    if (votes === 2) button.style.opacity = "1";
  }
});

// リセット
document.getElementById("resetVotesButton").addEventListener("click", () => {
  button.dataset.votes = 0;
  button.style.opacity = "1";
});

</script>

</body>
</html>
