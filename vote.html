<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>投票</title>
<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin-top: 120px;
}

/* 黄色い丸ボタン */
.vote-btn {
  width: 160px;
  height: 160px;
  background: #FFD700;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  transition: transform 0.1s ease, box-shadow 0.1s ease;
  box-shadow: 0 0 30px rgba(255,215,0,0.7);
}

/* 押したとき */
.vote-btn:active {
  transform: scale(0.95);
  box-shadow: 0 0 10px rgba(255,215,0,0.5);
}

#count {
  margin-top: 40px;
  font-size: 20px;
  opacity: 0.8;
}
</style>
</head>
<body>

<button class="vote-btn" onclick="vote()"></button>
<div id="count">0 / 2</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  authDomain: "ipponsystem-245b4.firebaseapp.com",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ipponsystem-245b4",
  storageBucket: "ipponsystem-245b4.firebasestorage.app",
  messagingSenderId: "1096087322754",
  appId: "1:1096087322754:web:cd18fd1386d05e5c1df49b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myVotes = 0;
const maxVotes = 2;

window.vote = function() {
  if (myVotes >= maxVotes) return;

  myVotes++;
  document.getElementById("count").textContent = myVotes + " / 2";

  const voteRef = ref(db, "votes");

  runTransaction(voteRef, (current) => {
    return (current || 0) + 1;
  });
};
</script>

</body>
</html>
