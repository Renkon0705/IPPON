<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票システム</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

.voteArea {
  margin-top: 40px;
}

.voteButton {
  width: 60px;
  height: 60px;
  background: gold;
  border-radius: 50%;
  display: inline-block;
  margin: 15px;
  cursor: pointer;
  transition: 0.2s;
}

.voteButton:hover {
  transform: scale(1.1);
}

#resetVotesButton {
  margin-top: 30px;
  padding: 10px 25px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #444;
  color: white;
  cursor: pointer;
}

#resetVotesButton:hover {
  background: #666;
}
</style>
</head>

<body>

<h2>投票</h2>

<div class="voteArea">
  <div class="voteButton" data-votes="0"></div>
  <div class="voteButton" data-votes="0"></div>
  <div class="voteButton" data-votes="0"></div>
  <div class="voteButton" data-votes="0"></div>
  <div class="voteButton" data-votes="0"></div>
</div>

<button id="resetVotesButton">リセット</button>

<script>

// 黄色丸ボタン処理
const voteButtons = document.querySelectorAll(".voteButton");

voteButtons.forEach(button => {

  button.addEventListener("click", () => {

    let votes = parseInt(button.dataset.votes);

    // 最大2票まで
    if (votes < 2) {
      votes++;
      button.dataset.votes = votes;

      // 押した回数で濃さ変更
      if (votes === 1) {
        button.style.opacity = "0.6";
      }
      if (votes === 2) {
        button.style.opacity = "1";
      }
    }

  });

});

// リセット処理
document.getElementById("resetVotesButton").addEventListener("click", () => {

  voteButtons.forEach(button => {
    button.dataset.votes = 0;
    button.style.opacity = "1";
  });

});

</script>

</body>
</html>
