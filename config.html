<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON設定</title>
<style>
body { font-family: sans-serif; text-align: center; margin-top: 50px; }
select, button { font-size: 18px; padding: 5px 10px; margin: 10px; }
</style>
</head>
<body>

<h1>IPPON システム設定</h1>

<label>参加人数：
  <select id="playerCount"></select>
</label><br>

<label>審査人数：
  <select id="judgeCount"></select>
</label><br>

<label>何票でIPPON？：
  <select id="threshold"></select>
</label><br>

<label>枠の太さ：
  <select id="frameThickness"></select>
</label><br>

<button onclick="saveSettings()">保存</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  authDomain: "ipponsystem-245b4.firebaseapp.com",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ipponsystem-245b4",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* 選択肢生成 */
function createOptions(id, max){
  const s = document.getElementById(id);
  for(let i=1;i<=max;i++){
    const o = document.createElement("option");
    o.value=i;
    o.textContent=i+"人";
    s.appendChild(o);
  }
}

function createThreshold(){
  const s=document.getElementById("threshold");
  for(let i=1;i<=20;i++){
    const o=document.createElement("option");
    o.value=i;
    o.textContent=i+"票";
    s.appendChild(o);
  }
}

function createThickness(){
  const s=document.getElementById("frameThickness");
  for(let i=10;i<=80;i+=5){
    const o=document.createElement("option");
    o.value=i;
    o.textContent=i+"px";
    s.appendChild(o);
  }
}

createOptions("playerCount",10);
createOptions("judgeCount",10);
createThreshold();
createThickness();

/* 保存 */
window.saveSettings = function(){
  const settings={
    playerCount:Number(playerCount.value),
    judgeCount:Number(judgeCount.value),
    threshold:Number(threshold.value),
    frameThickness:Number(frameThickness.value)
  };

  set(ref(db,"settings"),settings);
  alert("保存しました！");
};
</script>

</body>
</html>
