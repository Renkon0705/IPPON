<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON設定</title>
<style>
body { font-family: sans-serif; text-align: center; margin-top: 50px; }
select, button { font-size: 18px; padding: 5px 10px; margin: 10px; }
</style>
</head>
<body>

<h1>IPPON システム設定</h1>

<label>参加人数：
  <select id="playerCount"></select>
</label>
<br>

<label>審査人数：
  <select id="judgeCount"></select>
</label>
<br>

<label>何票でIPPON？：
  <select id="threshold"></select>
</label>
<br>

<button onclick="saveSettings()">保存</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  authDomain: "ipponsystem-245b4.firebaseapp.com",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ipponsystem-245b4",
  storageBucket: "ipponsystem-245b4.firebasestorage.app",
  messagingSenderId: "1096087322754",
  appId: "1:1096087322754:web:cd18fd1386d05e5c1df49b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 参加人数・審査人数 1〜10
function createOptions(selectId, max) {
  const select = document.getElementById(selectId);
  for (let i = 1; i <= max; i++) {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = i + "人";
    select.appendChild(option);
  }
}

// IPPON基準 1〜20
function createThresholdOptions() {
  const select = document.getElementById("threshold");
  for (let i = 1; i <= 20; i++) {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = i + "票";
    select.appendChild(option);
  }
}

createOptions("playerCount", 10);
createOptions("judgeCount", 10);
createThresholdOptions();

window.saveSettings = function() {
  const settings = {
    playerCount: Number(document.getElementById("playerCount").value),
    judgeCount: Number(document.getElementById("judgeCount").value),
    threshold: Number(document.getElementById("threshold").value)
  };

  set(ref(db, "settings"), settings);
  alert("保存しました！");
};
</script>

</body>
</html>
