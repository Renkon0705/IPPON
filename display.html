<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON表示</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>
<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
}
#votes {
  font-size: 80px;
  margin-top: 100px;
}
#ippon {
  font-size: 120px;
  color: gold;
  display: none;
}
</style>
</head>
<body>

<h1>現在の票</h1>
<div id="votes">0</div>
<div id="ippon">🏆 IPPON！</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  authDomain: "ipponsystem-245b4.firebaseapp.com",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ipponsystem-245b4",
  storageBucket: "ipponsystem-245b4.firebasestorage.app",
  messagingSenderId: "1096087322754",
  appId: "1:1096087322754:web:cd18fd1386d05e5c1df49b",
  measurementId: "G-3FCR2JR8JD"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const voteRef = ref(db, "votes");
const voteDisplay = document.getElementById("votes");
const ipponDisplay = document.getElementById("ippon");

const settingsRef = ref(db, "settings");

let IPPON_THRESHOLD = 5;

onValue(settingsRef, (snapshot) => {
  const data = snapshot.val();
  if (data && data.threshold) {
    IPPON_THRESHOLD = Number(data.threshold);
  }
});

onValue(voteRef, (snapshot) => {
  const value = snapshot.val() || 0;
  voteDisplay.textContent = value;

  if (value >= IPPON_THRESHOLD) {
    ipponDisplay.style.display = "block";

    setTimeout(() => {
      ipponDisplay.style.display = "none";
      set(voteRef, 0);
    }, 3000);
  }
});
</script>

</body>
</html>
