<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON表示</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* 外枠 */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  border: 20px solid black;
  z-index: 100;
}

/* カメラ */
#camera {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* コンテナ */
#frameContainer {
  position: fixed;
  width: 100%;
  height: 100%;
}

/* ===== フレーム ===== */
.frameStep {
  position: absolute;
}

/* 外（黄色） */
.outer {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ffe600;

  clip-path: polygon(
    12% 0%, 88% 0%,
    100% 12%, 100% 88%,
    88% 100%, 12% 100%,
    0% 88%, 0% 12%
  );
}

/* 内（くり抜き用） */
.inner {
  position: absolute;
  top: 18px;
  left: 18px;
  right: 18px;
  bottom: 18px;

  /* 背景なしにする */
  background: transparent;

  /* 同じ形で小さく */
  clip-path: polygon(
    12% 0%, 88% 0%,
    100% 12%, 100% 88%,
    88% 100%, 12% 100%,
    0% 88%, 0% 12%
  );
}

/* ===== IPPON ===== */
#ipponWrapper {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  display: none;
  animation: pop 0.3s ease forwards;
  z-index: 200;
}

#ipponBoard {
  background: black;
  padding: 40px 120px;
  box-shadow: 0 0 40px gold;
}

#ipponText {
  font-size: 140px;
  font-weight: 900;
  color: #ffe600;
}

@keyframes pop {
  to {
    transform: translate(-50%, -50%) scale(1);
  }
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline muted></video>

<div id="frameContainer"></div>

<div id="ipponWrapper">
  <div id="ipponBoard">
    <div id="ipponText">IPPON</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const voteRef = ref(db, "votes");
const settingsRef = ref(db, "settings");

const container = document.getElementById("frameContainer");
const ipponDisplay = document.getElementById("ipponWrapper");

let IPPON_THRESHOLD = 5;
let lastValue = 0;

/* 設定反映 */
onValue(settingsRef, (snapshot) => {
  const data = snapshot.val();
  if (data?.threshold) {
    IPPON_THRESHOLD = Number(data.threshold);
  }
});

/* カメラ */
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById("camera").srcObject = stream;
});

/* 音 */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
document.body.addEventListener("click", () => audioCtx.resume(), { once: true });

function playTone(f) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.frequency.value = f;
  g.gain.value = 0.25;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.2);
}

/* ===== 枠（ここが最重要） ===== */
function drawFrames(count) {
  container.innerHTML = "";

  const padding = 40; // ← 初期位置を画面内に収める
  const max = (Math.min(window.innerWidth, window.innerHeight) / 2) - padding;
  const step = max / IPPON_THRESHOLD;

  for (let i = 0; i < count; i++) {
    const frame = document.createElement("div");
    frame.className = "frameStep";

    const offset = padding + i * step;

    frame.style.top = offset + "px";
    frame.style.left = offset + "px";
    frame.style.right = offset + "px";
    frame.style.bottom = offset + "px";

    const outer = document.createElement("div");
    outer.className = "outer";

    const inner = document.createElement("div");
    inner.className = "inner";

    frame.appendChild(outer);
    frame.appendChild(inner);

    container.appendChild(frame);
  }
}

/* 監視 */
onValue(voteRef, (snapshot) => {
  const value = snapshot.val() || 0;

  drawFrames(value);

  if (value > lastValue) {
    playTone(600 + value * 100);
  }

  if (value >= IPPON_THRESHOLD) {
    ipponDisplay.style.display = "block";

    setTimeout(() => {
      ipponDisplay.style.display = "none";
      drawFrames(0);
      set(voteRef, 0);
    }, 3000);
  }

  lastValue = value;
});
</script>

</body>
</html>
