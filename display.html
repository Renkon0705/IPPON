<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON表示</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* 枠コンテナ */
#frameContainer {
  position: fixed;
  width: 100%;
  height: 100%;
}

/* 枠1本（太さアップ＆影で立体感） */
.frameStep {
  position: absolute;
  border: 10px solid #ffe600;
  box-sizing: border-box;
  box-shadow: 0 0 10px rgba(255, 230, 0, 0.6);
}

/* IPPON */
#ipponWrapper {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  display: none;
  animation: pop 0.3s ease forwards;
}

#ipponBoard {
  background: black;
  padding: 40px 120px;
  box-shadow: 0 0 40px gold;
}

#ipponText {
  font-size: 140px;
  font-weight: 900;
  color: #ffe600;
}

@keyframes pop {
  to {
    transform: translate(-50%, -50%) scale(1);
  }
}
</style>
</head>

<body>

<div id="frameContainer"></div>

<div id="ipponWrapper">
  <div id="ipponBoard">
    <div id="ipponText">IPPON</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  authDomain: "ipponsystem-245b4.firebaseapp.com",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ipponsystem-245b4",
  storageBucket: "ipponsystem-245b4.firebasestorage.app",
  messagingSenderId: "1096087322754",
  appId: "1:1096087322754:web:cd18fd1386d05e5c1df49b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const voteRef = ref(db, "votes");
const settingsRef = ref(db, "settings");

const container = document.getElementById("frameContainer");
const ipponDisplay = document.getElementById("ipponWrapper");

let lastValue = 0;
let IPPON_THRESHOLD = 5;

/* ===== ① threshold取得 ===== */
onValue(settingsRef, (snapshot) => {
  const data = snapshot.val();
  if (data && data.threshold) {
    IPPON_THRESHOLD = Number(data.threshold);
  }
});

/* ===== 音 ===== */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const scale = [523, 587, 659, 698, 784, 880, 988, 1046];

function playTone(freq) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  gain.gain.value = 0.2;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.15);
}

function playSuccess() {
  [784, 988, 1318].forEach((f, i) => {
    setTimeout(() => playTone(f), i * 120);
  });
}

/* ===== ② 枠間隔を自動調整 ===== */
function drawFrames(count) {
  container.innerHTML = "";

  if (count === 0) return;

  const w = window.innerWidth;
  const h = window.innerHeight;
  const max = Math.min(w, h) / 2;

  // IPPON時にピッタリ中央まで行くように計算
  const step = max / IPPON_THRESHOLD;

  for (let i = 0; i < count; i++) {
    const div = document.createElement("div");
    div.className = "frameStep";

    const m = i * step;

    div.style.top = m + "px";
    div.style.left = m + "px";
    div.style.right = m + "px";
    div.style.bottom = m + "px";

    container.appendChild(div);
  }
}

/* ===== 監視 ===== */
onValue(voteRef, (snapshot) => {
  const value = snapshot.val() || 0;

  drawFrames(value);

  if (value > lastValue) {
    playTone(scale[Math.min(value - 1, scale.length - 1)]);
  }

  if (value >= IPPON_THRESHOLD) {

    playSuccess();

    ipponDisplay.style.display = "block";

    setTimeout(() => {
      ipponDisplay.style.display = "none";
      drawFrames(0);
      set(voteRef, 0);
    }, 3000);
  }

  lastValue = value;
});
</script>

</body>
</html>
