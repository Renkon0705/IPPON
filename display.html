<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON表示</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* カメラ */
#camera {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 外枠 */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  border: 20px solid black;
  z-index: 10;
  pointer-events: none;
}

/* SVG */
#frameSVG {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* IPPON */
#ipponWrapper {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  display: none;
  animation: pop 0.3s ease forwards;
  z-index: 20;
}

#ipponBoard {
  background: black;
  padding: 40px 120px;
  box-shadow: 0 0 40px gold;
}

#ipponText {
  font-size: 140px;
  font-weight: 900;
  color: #ffe600;
}

@keyframes pop {
  to {
    transform: translate(-50%, -50%) scale(1);
  }
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline muted></video>

<!-- SVG枠 -->
<svg id="frameSVG"></svg>

<div id="ipponWrapper">
  <div id="ipponBoard">
    <div id="ipponText">IPPON</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const voteRef = ref(db, "votes");
const settingsRef = ref(db, "settings");

const svg = document.getElementById("frameSVG");

let IPPON_THRESHOLD = 5;
let lastValue = 0;

/* 設定 */
onValue(settingsRef, (snap) => {
  const d = snap.val();
  if (d?.threshold) IPPON_THRESHOLD = Number(d.threshold);
});

/* カメラ */
navigator.mediaDevices.getUserMedia({ video: true })
.then(s => document.getElementById("camera").srcObject = s);

/* 音 */
const ctx = new (window.AudioContext || window.webkitAudioContext)();
document.body.addEventListener("click", () => ctx.resume(), { once: true });

function tone(f){
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.frequency.value = f;
  g.gain.value = 0.25;
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+0.2);
}

/* ===== 八角形パス ===== */
function getOctagon(w, h, pad){
  return `
    ${pad + w*0.12},${pad}
    ${pad + w*0.88},${pad}
    ${pad + w},${pad + h*0.12}
    ${pad + w},${pad + h*0.88}
    ${pad + w*0.88},${pad + h}
    ${pad + w*0.12},${pad + h}
    ${pad},${pad + h*0.88}
    ${pad},${pad + h*0.12}
  `;
}

/* ===== 描画 ===== */
function draw(count){
  svg.innerHTML = "";

  const w = window.innerWidth;
  const h = window.innerHeight;

  const margin = 60;
  const max = Math.min(w, h) - margin*2;
  const step = max / IPPON_THRESHOLD;

  for(let i=0;i<count;i++){
    const size = max - i*step;
    const offset = (Math.min(w,h)-size)/2;

    const poly = document.createElementNS("http://www.w3.org/2000/svg","polygon");

    poly.setAttribute("points", getOctagon(size, size, offset));
    poly.setAttribute("fill", "none");
    poly.setAttribute("stroke", "#ffe600");
    poly.setAttribute("stroke-width", "12");

    svg.appendChild(poly);
  }
}

/* 監視 */
onValue(voteRef, snap=>{
  const v = snap.val()||0;

  draw(v);

  if(v>lastValue) tone(600+v*100);

  if(v>=IPPON_THRESHOLD){
    document.getElementById("ipponWrapper").style.display="block";

    setTimeout(()=>{
      document.getElementById("ipponWrapper").style.display="none";
      draw(0);
      set(voteRef,0);
    },3000);
  }

  lastValue=v;
});
</script>

</body>
</html>
