<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON表示</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* コンテナ */
#frameContainer {
  position: fixed;
  width: 100%;
  height: 100%;
}

/* 八角形フレーム */
.frameStep {
  position: absolute;
  box-sizing: border-box;
  border: 30px solid #ffe600;

  /* 八角形 */
  clip-path: polygon(
    10% 0%, 90% 0%,
    100% 10%, 100% 90%,
    90% 100%, 10% 100%,
    0% 90%, 0% 10%
  );

  box-shadow:
    0 0 12px rgba(255,230,0,0.7),
    inset 0 0 8px rgba(255,255,255,0.3);
}

/* IPPON */
#ipponWrapper {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  display: none;
  animation: pop 0.3s ease forwards;
}

#ipponBoard {
  background: black;
  padding: 40px 120px;
  box-shadow: 0 0 40px gold;
}

#ipponText {
  font-size: 140px;
  font-weight: 900;
  color: #ffe600;
}

@keyframes pop {
  to {
    transform: translate(-50%, -50%) scale(1);
  }
}
</style>
</head>

<body>

<div id="frameContainer"></div>

<div id="ipponWrapper">
  <div id="ipponBoard">
    <div id="ipponText">IPPON</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  authDomain: "ipponsystem-245b4.firebaseapp.com",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ipponsystem-245b4",
  storageBucket: "ipponsystem-245b4.firebasestorage.app",
  messagingSenderId: "1096087322754",
  appId: "1:1096087322754:web:cd18fd1386d05e5c1df49b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const voteRef = ref(db, "votes");
const settingsRef = ref(db, "settings");

const container = document.getElementById("frameContainer");
const ipponDisplay = document.getElementById("ipponWrapper");

let lastValue = 0;
let IPPON_THRESHOLD = 5;

/* threshold取得 */
onValue(settingsRef, (snapshot) => {
  const data = snapshot.val();
  if (data && data.threshold) {
    IPPON_THRESHOLD = Number(data.threshold);
  }
});

/* 枠描画 */
function drawFrames(count) {
  container.innerHTML = "";

  if (count === 0) return;

  const w = window.innerWidth;
  const h = window.innerHeight;
  const max = Math.min(w, h) / 2;

  const step = max / IPPON_THRESHOLD;

  for (let i = 0; i < count; i++) {
    const div = document.createElement("div");
    div.className = "frameStep";

    const m = i * step;

    div.style.top = m + "px";
    div.style.left = m + "px";
    div.style.right = m + "px";
    div.style.bottom = m + "px";

    container.appendChild(div);
  }
}

/* 監視 */
onValue(voteRef, (snapshot) => {
  const value = snapshot.val() || 0;

  drawFrames(value);

  if (value >= IPPON_THRESHOLD) {
    ipponDisplay.style.display = "block";

    setTimeout(() => {
      ipponDisplay.style.display = "none";
      drawFrames(0);
      set(voteRef, 0);
    }, 3000);
  }
});
</script>

</body>
</html>
