<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON表示</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* 枠コンテナ */
#frameContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* 1本の枠 */
.frameStep {
  position: absolute;
  border: 6px solid gold;
  box-sizing: border-box;
  pointer-events: none;
}

/* IPPON */
#ipponWrapper {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  display: none;
  animation: pop 0.3s ease forwards;
}

#ipponBoard {
  background: black;
  padding: 40px 120px;
  border-radius: 10px;
  box-shadow: 0 0 40px gold;
}

#ipponText {
  font-size: 140px;
  font-weight: 900;
  color: #ffe600;
  letter-spacing: 10px;
}

@keyframes pop {
  to {
    transform: translate(-50%, -50%) scale(1);
  }
}
</style>
</head>

<body>

<div id="frameContainer"></div>

<div id="ipponWrapper">
  <div id="ipponBoard">
    <div id="ipponText">IPPON</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "...",
  databaseURL: "...",
  projectId: "...",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const voteRef = ref(db, "votes");

const container = document.getElementById("frameContainer");
const ipponDisplay = document.getElementById("ipponWrapper");

let IPPON_THRESHOLD = 5;

/* 枠を描画 */
function drawFrames(count) {
  container.innerHTML = "";

  for (let i = 0; i < count; i++) {
    const div = document.createElement("div");
    div.className = "frameStep";

    const margin = i * 20;

    div.style.top = margin + "px";
    div.style.left = margin + "px";
    div.style.right = margin + "px";
    div.style.bottom = margin + "px";

    container.appendChild(div);
  }
}

/* 監視 */
onValue(voteRef, (snapshot) => {
  const value = snapshot.val() || 0;

  drawFrames(value);

  if (value >= IPPON_THRESHOLD) {

    ipponDisplay.style.display = "block";

    setTimeout(() => {
      ipponDisplay.style.display = "none";
      drawFrames(0);
      set(voteRef, 0);
    }, 3000);
  }
});
</script>

</body>
</html>
