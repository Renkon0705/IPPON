<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON表示</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

#frameContainer {
  margin-top: 150px;
}

.ipponFrame {
  display: inline-block;
  width: 80px;
  height: 80px;
  margin: 10px;
  border: 5px solid gold;
  background: transparent;
  opacity: 0.2;
  transition: 0.3s;
}

.filled {
  background: gold;
  opacity: 1;
}

#ippon {
  font-size: 120px;
  color: gold;
  display: none;
  margin-top: 50px;
}
</style>
</head>
<body>

<h1>現在の票</h1>

<div id="frameContainer"></div>

<div id="ippon">🏆 IPPON！</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  authDomain: "ipponsystem-245b4.firebaseapp.com",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ipponsystem-245b4",
  storageBucket: "ipponsystem-245b4.firebasestorage.app",
  messagingSenderId: "1096087322754",
  appId: "1:1096087322754:web:cd18fd1386d05e5c1df49b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const voteRef = ref(db, "votes");
const settingsRef = ref(db, "settings");

const container = document.getElementById("frameContainer");
const ipponDisplay = document.getElementById("ippon");

let IPPON_THRESHOLD = 5;

// 設定読み込み
onValue(settingsRef, (snapshot) => {
  const data = snapshot.val();
  if (data && data.threshold) {
    IPPON_THRESHOLD = Number(data.threshold);
    createFrames(IPPON_THRESHOLD);
  }
});

// 枠を生成
function createFrames(count) {
  container.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const frame = document.createElement("div");
    frame.classList.add("ipponFrame");
    container.appendChild(frame);
  }
}

// 票監視
onValue(voteRef, (snapshot) => {
  const value = snapshot.val() || 0;
  const frames = document.querySelectorAll(".ipponFrame");

  frames.forEach((frame, index) => {
    if (index < value) {
      frame.classList.add("filled");
    } else {
      frame.classList.remove("filled");
    }
  });

  if (value >= IPPON_THRESHOLD) {
    ipponDisplay.style.display = "block";

    setTimeout(() => {
      ipponDisplay.style.display = "none";
      set(voteRef, 0);
    }, 3000);
  }
});
</script>

</body>
</html>
