<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON表示</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* カメラ */
#camera {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 外枠 */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  border: 20px solid black;
  z-index: 10;
}

/* SVG */
#frameSVG {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

/* IPPON */
#ipponWrapper {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  display: none;
  animation: pop 0.3s ease forwards;
  z-index: 20;
}

#ipponBoard {
  background: black;
  padding: 40px 120px;
  box-shadow: 0 0 40px gold;
}

#ipponText {
  font-size: 140px;
  font-weight: 900;
  color: #ffe600;
}

@keyframes pop {
  to {
    transform: translate(-50%, -50%) scale(1);
  }
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline muted></video>
<svg id="frameSVG"></svg>

<div id="ipponWrapper">
  <div id="ipponBoard">
    <div id="ipponText">IPPON</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* Firebase */
const app = initializeApp({
  apiKey: "AIzaSy...",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = getDatabase(app);

const voteRef = ref(db, "votes");
const settingsRef = ref(db, "settings");

const svg = document.getElementById("frameSVG");

let IPPON_THRESHOLD = 5;
let lastValue = 0;

/* 設定 */
onValue(settingsRef, snap=>{
  const d = snap.val();
  if(d?.threshold) IPPON_THRESHOLD = Number(d.threshold);
});

/* カメラ */
navigator.mediaDevices.getUserMedia({ video: true })
.then(s=>camera.srcObject=s);

/* 音 */
const ctx = new (window.AudioContext || window.webkitAudioContext)();
document.body.addEventListener("click", ()=>ctx.resume(), {once:true});

function tone(f){
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.frequency.value=f;
  g.gain.value=0.25;
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+0.2);
}

/* ===== 八角形（画面基準） ===== */
function octagon(w, h, m){
  return `
    ${m+w*0.1},${m}
    ${m+w*0.9},${m}
    ${m+w},${m+h*0.1}
    ${m+w},${m+h*0.9}
    ${m+w*0.9},${m+h}
    ${m+w*0.1},${m+h}
    ${m},${m+h*0.9}
    ${m},${m+h*0.1}
  `;
}

/* ===== 描画（ここが完成形） ===== */
function draw(count){
  svg.innerHTML="";

  const w = window.innerWidth;
  const h = window.innerHeight;

  const gap = 18;          // 枠の間隔（狭く）
  const thickness = 14;    // 枠の太さ

  for(let i=0;i<count;i++){

    const offset = i * (gap + thickness);

    /* 外側（黒ライン） */
    const outer = document.createElementNS("http://www.w3.org/2000/svg","polygon");
    outer.setAttribute("points", octagon(w-2*offset, h-2*offset, offset));
    outer.setAttribute("fill","none");
    outer.setAttribute("stroke","black");
    outer.setAttribute("stroke-width", thickness + 4);

    /* 内側（黄色） */
    const inner = document.createElementNS("http://www.w3.org/2000/svg","polygon");
    inner.setAttribute("points", octagon(w-2*offset, h-2*offset, offset));
    inner.setAttribute("fill","none");
    inner.setAttribute("stroke","#ffe600");
    inner.setAttribute("stroke-width", thickness);

    svg.appendChild(outer);
    svg.appendChild(inner);
  }
}

/* 監視 */
onValue(voteRef, snap=>{
  const v = snap.val()||0;

  draw(v);

  if(v>lastValue) tone(600+v*100);

  if(v>=IPPON_THRESHOLD){
    ipponWrapper.style.display="block";

    setTimeout(()=>{
      ipponWrapper.style.display="none";
      draw(0);
      set(voteRef,0);
    },3000);
  }

  lastValue=v;
});
</script>

</body>
</html>
