<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON表示</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* 外枠 */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  border: 20px solid black;
  z-index: 100;
  pointer-events: none;
}

/* カメラ */
#camera {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* コンテナ */
#frameContainer {
  position: fixed;
  width: 100%;
  height: 100%;
}

/* フレーム */
.frameStep {
  position: absolute;
}

/* 黄色枠 */
.outer {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ffe600;

  clip-path: polygon(
    10% 0%, 90% 0%,
    100% 10%, 100% 90%,
    90% 100%, 10% 100%,
    0% 90%, 0% 10%
  );
}

/* 内側（透明でくり抜き） */
.inner {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  bottom: 20px;

  background: transparent; /* ←ここが超重要 */

  clip-path: polygon(
    10% 0%, 90% 0%,
    100% 10%, 100% 90%,
    90% 100%, 10% 100%,
    0% 90%, 0% 10%
  );
}

/* IPPON */
#ipponWrapper {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  display: none;
  animation: pop 0.3s ease forwards;
  z-index: 200;
}

#ipponBoard {
  background: black;
  padding: 40px 120px;
  box-shadow: 0 0 40px gold;
}

#ipponText {
  font-size: 140px;
  font-weight: 900;
  color: #ffe600;
}

@keyframes pop {
  to {
    transform: translate(-50%, -50%) scale(1);
  }
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline muted></video>

<div id="frameContainer"></div>

<div id="ipponWrapper">
  <div id="ipponBoard">
    <div id="ipponText">IPPON</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ipponsystem-245b4.firebaseapp.com",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const voteRef = ref(db, "votes");

const container = document.getElementById("frameContainer");
const ipponDisplay = document.getElementById("ipponWrapper");

let lastValue = 0;
let IPPON_THRESHOLD = 5;

/* カメラ */
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById("camera").srcObject = stream;
});

/* ===== 音（修正版） ===== */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// クリックで有効化
document.body.addEventListener("click", () => {
  audioCtx.resume();
}, { once: true });

function playTone(freq) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  gain.gain.value = 0.25;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function playSuccess() {
  [784, 988, 1318].forEach((f, i) => {
    setTimeout(() => playTone(f), i * 120);
  });
}

/* 枠 */
function drawFrames(count) {
  container.innerHTML = "";

  const gap = 25;
  const thickness = 20;

  for (let i = 0; i < count; i++) {
    const frame = document.createElement("div");
    frame.className = "frameStep";

    const offset = i * (gap + thickness);

    frame.style.top = offset + "px";
    frame.style.left = offset + "px";
    frame.style.right = offset + "px";
    frame.style.bottom = offset + "px";

    const outer = document.createElement("div");
    outer.className = "outer";

    const inner = document.createElement("div");
    inner.className = "inner";

    frame.appendChild(outer);
    frame.appendChild(inner);

    container.appendChild(frame);
  }
}

/* 監視 */
onValue(voteRef, (snapshot) => {
  const value = snapshot.val() || 0;

  drawFrames(value);

  if (value > lastValue) {
    playTone(600 + value * 100);
  }

  if (value >= IPPON_THRESHOLD) {
    playSuccess();

    ipponDisplay.style.display = "block";

    setTimeout(() => {
      ipponDisplay.style.display = "none";
      drawFrames(0);
      set(voteRef, 0);
    }, 3000);
  }

  lastValue = value;
});
</script>

</body>
</html>
