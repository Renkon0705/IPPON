<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON表示</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#camera {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
}

body::after {
  content:"";
  position:fixed;
  inset:0;
  border:20px solid black;
  z-index:10;
}

#frameSVG {
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
}

#ipponWrapper {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  display:none;
  animation:pop 0.3s forwards;
  z-index:20;
}

#ipponBoard {
  background:black;
  padding:40px 120px;
  box-shadow:0 0 40px gold;
}

#ipponText {
  font-size:140px;
  font-weight:900;
  color:#ffe600;
}

@keyframes pop {
  to { transform:translate(-50%,-50%) scale(1); }
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline muted></video>
<svg id="frameSVG"></svg>

<div id="ipponWrapper">
  <div id="ipponBoard">
    <div id="ipponText">IPPON</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* Firebase */
const app = initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = getDatabase(app);

const voteRef = ref(db,"votes");
const settingsRef = ref(db,"settings");

const svg = document.getElementById("frameSVG");

let IPPON_THRESHOLD = 5;
let lastValue = 0;

/* 設定 */
onValue(settingsRef,snap=>{
  const d=snap.val();
  if(d?.threshold) IPPON_THRESHOLD = Number(d.threshold);
});

/* カメラ */
navigator.mediaDevices.getUserMedia({video:true})
.then(s=>camera.srcObject=s);

/* 音 */
const ctx = new (window.AudioContext||window.webkitAudioContext)();
document.body.addEventListener("click",()=>ctx.resume(),{once:true});

function tone(f){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.frequency.value=f;
  g.gain.value=0.25;
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+0.2);
}

/* 八角形 */
function octagon(w,h,m){
  return `
    ${m+w*0.1},${m}
    ${m+w*0.9},${m}
    ${m+w},${m+h*0.1}
    ${m+w},${m+h*0.9}
    ${m+w*0.9},${m+h}
    ${m+w*0.1},${m+h}
    ${m},${m+h*0.9}
    ${m},${m+h*0.1}
  `;
}

/* ===== 完全版ロジック ===== */
function draw(count){
  svg.innerHTML="";

  const w = window.innerWidth;
  const h = window.innerHeight;

  const maxDepth = Math.min(w,h)/2;

  /* ① 太さ配列を作る */
  const thicknesses = [];
  for(let i=0;i<count;i++){
    // 外太く内細く
    const t = 40 * (1 - i/(IPPON_THRESHOLD));
    thicknesses.push(t);
  }

  /* ② 合計をスケーリング */
  const sum = thicknesses.reduce((a,b)=>a+b,0);
  const scale = maxDepth / sum;

  const scaled = thicknesses.map(t=>t*scale);

  /* ③ 累積で配置 */
  let offset = 0;

  for(let i=0;i<count;i++){
    const t = scaled[i];

    const outer = document.createElementNS("http://www.w3.org/2000/svg","polygon");
    outer.setAttribute("points", octagon(w-2*offset, h-2*offset, offset));
    outer.setAttribute("fill","none");
    outer.setAttribute("stroke","black");
    outer.setAttribute("stroke-width", t + 4);

    const inner = document.createElementNS("http://www.w3.org/2000/svg","polygon");
    inner.setAttribute("points", octagon(w-2*offset, h-2*offset, offset));
    inner.setAttribute("fill","none");
    inner.setAttribute("stroke","#ffe600");
    inner.setAttribute("stroke-width", t);

    svg.appendChild(outer);
    svg.appendChild(inner);

    offset += t; // ←これが超重要
  }
}

/* 監視 */
onValue(voteRef,snap=>{
  const v = snap.val()||0;

  draw(v);

  if(v>lastValue) tone(600+v*100);

  if(v>=IPPON_THRESHOLD){
    ipponWrapper.style.display="block";

    setTimeout(()=>{
      ipponWrapper.style.display="none";
      draw(0);
      set(voteRef,0);
    },3000);
  }

  lastValue=v;
});
</script>

</body>
</html>
