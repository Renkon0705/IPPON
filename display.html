<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON表示</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* 外枠 */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  border: 20px solid black;
  z-index: 100;
  pointer-events: none;
}

/* カメラ */
#camera {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* コンテナ */
#frameContainer {
  position: fixed;
  width: 100%;
  height: 100%;
}

/* ===== フレーム（完全くり抜き） ===== */
.frameStep {
  position: absolute;
  background: #ffe600;

  /* 八角形（修正版） */
  clip-path: polygon(
    12% 0%, 88% 0%,
    100% 12%, 100% 88%,
    88% 100%, 12% 100%,
    0% 88%, 0% 12%
  );

  /* くり抜き（最重要） */
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;

  mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  mask-composite: exclude;

  padding: 18px; /* 枠の太さ */
}

/* IPPON */
#ipponWrapper {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  display: none;
  animation: pop 0.3s ease forwards;
  z-index: 200;
}

#ipponBoard {
  background: black;
  padding: 40px 120px;
  box-shadow: 0 0 40px gold;
}

#ipponText {
  font-size: 140px;
  font-weight: 900;
  color: #ffe600;
}

@keyframes pop {
  to {
    transform: translate(-50%, -50%) scale(1);
  }
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline muted></video>

<div id="frameContainer"></div>

<div id="ipponWrapper">
  <div id="ipponBoard">
    <div id="ipponText">IPPON</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ===== Firebase ===== */
const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  authDomain: "ipponsystem-245b4.firebaseapp.com",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ipponsystem-245b4",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const voteRef = ref(db, "votes");
const settingsRef = ref(db, "settings");

const container = document.getElementById("frameContainer");
const ipponDisplay = document.getElementById("ipponWrapper");

let lastValue = 0;
let IPPON_THRESHOLD = 5;

/* ===== 設定読み込み ===== */
onValue(settingsRef, (snapshot) => {
  const data = snapshot.val();
  if (data && data.threshold) {
    IPPON_THRESHOLD = Number(data.threshold);
  }
});

/* ===== カメラ ===== */
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById("camera").srcObject = stream;
});

/* ===== 音 ===== */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

document.body.addEventListener("click", () => {
  audioCtx.resume();
}, { once: true });

function playTone(freq) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  gain.gain.value = 0.25;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function playSuccess() {
  [784, 988, 1318].forEach((f, i) => {
    setTimeout(() => playTone(f), i * 120);
  });
}

/* ===== 枠描画（ここ超重要） ===== */
function drawFrames(count) {
  container.innerHTML = "";

  const max = Math.min(window.innerWidth, window.innerHeight) / 2;
  const step = max / IPPON_THRESHOLD;

  for (let i = 0; i < count; i++) {
    const frame = document.createElement("div");
    frame.className = "frameStep";

    const offset = i * step;

    frame.style.top = offset + "px";
    frame.style.left = offset + "px";
    frame.style.right = offset + "px";
    frame.style.bottom = offset + "px";

    container.appendChild(frame);
  }
}

/* ===== 監視 ===== */
onValue(voteRef, (snapshot) => {
  const value = snapshot.val() || 0;

  drawFrames(value);

  if (value > lastValue) {
    playTone(600 + value * 100);
  }

  if (value >= IPPON_THRESHOLD) {

    playSuccess();

    ipponDisplay.style.display = "block";

    setTimeout(() => {
      ipponDisplay.style.display = "none";
      drawFrames(0);
      set(voteRef, 0);
    }, 3000);
  }

  lastValue = value;
});
</script>

</body>
</html>
