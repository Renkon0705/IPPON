<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON表示</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
}

/* ===== 黄色フレーム ===== */
#frame {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  box-sizing: border-box;

  border: 0px solid gold;
  transition: border-width 0.3s ease;
}

/* 段ライン用オーバーレイ */
#lines {
  position: fixed;
  inset: 0;
  pointer-events: none;

  background-image:
    repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 36px,
      black 36px,
      black 40px
    ),
    repeating-linear-gradient(
      to right,
      transparent 0px,
      transparent 36px,
      black 36px,
      black 40px
    );

  display: none;
}

/* ===== IPPON演出 ===== */
#ipponWrapper {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  display: none;
  animation: pop 0.3s ease forwards;
}

#ipponBoard {
  background: black;
  padding: 40px 120px;
  border-radius: 10px;
  box-shadow: 0 0 40px gold;
}

#ipponText {
  font-size: 140px;
  font-weight: 900;
  color: #ffe600;
  letter-spacing: 10px;
  text-shadow:
    0 4px 0 #c9a800,
    0 8px 20px rgba(0,0,0,0.8);
}

@keyframes pop {
  to {
    transform: translate(-50%, -50%) scale(1);
  }
}
</style>
</head>

<body>

<div id="frame"></div>
<div id="lines"></div>

<div id="ipponWrapper">
  <div id="ipponBoard">
    <div id="ipponText">IPPON</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  authDomain: "ipponsystem-245b4.firebaseapp.com",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ipponsystem-245b4",
  storageBucket: "ipponsystem-245b4.firebasestorage.app",
  messagingSenderId: "1096087322754",
  appId: "1:1096087322754:web:cd18fd1386d05e5c1df49b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const voteRef = ref(db, "votes");
const settingsRef = ref(db, "settings");

const frame = document.getElementById("frame");
const lines = document.getElementById("lines");
const ipponDisplay = document.getElementById("ipponWrapper");

let IPPON_THRESHOLD = 5;

onValue(settingsRef, (snapshot) => {
  const data = snapshot.val();
  if (data && data.threshold) {
    IPPON_THRESHOLD = Number(data.threshold);
  }
});

function getMaxBorder() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  return Math.min(w, h) / 2;
}

onValue(voteRef, (snapshot) => {

  const value = snapshot.val() || 0;

  const maxBorder = getMaxBorder();
  const borderSize = (value / IPPON_THRESHOLD) * maxBorder;

  frame.style.borderWidth = borderSize + "px";

  // 枠が出てる間だけ段ライン表示
  if (borderSize > 0) {
    lines.style.display = "block";
  } else {
    lines.style.display = "none";
  }

  if (value >= IPPON_THRESHOLD) {

    ipponDisplay.style.display = "block";
    ipponDisplay.style.animation = "none";
    void ipponDisplay.offsetWidth;
    ipponDisplay.style.animation = "pop 0.3s ease forwards";

    setTimeout(() => {
      ipponDisplay.style.display = "none";
      frame.style.borderWidth = "0px";
      lines.style.display = "none";
      set(voteRef, 0);
    }, 3000);
  }
});
</script>

</body>
</html>
