<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IPPON表示</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
}

.layer {
  position: fixed;
  box-sizing: border-box;
  border: 4px solid black; /* ← 黒アウトライン */
  background: gold;
  pointer-events: none;
}

/* ===== IPPON演出 ===== */

#ipponWrapper {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  display: none;
  animation: pop 0.3s ease forwards;
}

#ipponBoard {
  background: black;
  padding: 40px 120px;
  border-radius: 10px;
  box-shadow: 0 0 40px gold;
}

#ipponText {
  font-size: 140px;
  font-weight: 900;
  color: #ffe600;
  letter-spacing: 10px;
  text-shadow:
    0 4px 0 #c9a800,
    0 8px 20px rgba(0,0,0,0.8);
}

@keyframes pop {
  to {
    transform: translate(-50%, -50%) scale(1);
  }
}
</style>
</head>

<body>

<div id="ipponWrapper">
  <div id="ipponBoard">
    <div id="ipponText">IPPON</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi4a7SeWlbQspdevchiDJYCtfIIqOn5GM",
  authDomain: "ipponsystem-245b4.firebaseapp.com",
  databaseURL: "https://ipponsystem-245b4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ipponsystem-245b4",
  storageBucket: "ipponsystem-245b4.firebasestorage.app",
  messagingSenderId: "1096087322754",
  appId: "1:1096087322754:web:cd18fd1386d05e5c1df49b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const voteRef = ref(db, "votes");
const settingsRef = ref(db, "settings");

const ipponDisplay = document.getElementById("ipponWrapper");

let IPPON_THRESHOLD = 5;

onValue(settingsRef, (snapshot) => {
  const data = snapshot.val();
  if (data && data.threshold) {
    IPPON_THRESHOLD = Number(data.threshold);
  }
});

/* レイヤー描画 */
function renderLayers(votes) {

  // 既存削除
  document.querySelectorAll(".layer").forEach(el => el.remove());

  const maxSize = Math.min(window.innerWidth, window.innerHeight) / 2;
  const step = maxSize / IPPON_THRESHOLD;

  for (let i = 0; i < votes; i++) {

    const size = step * (i + 1);

    const div = document.createElement("div");
    div.className = "layer";

    div.style.top = size + "px";
    div.style.left = size + "px";
    div.style.right = size + "px";
    div.style.bottom = size + "px";

    document.body.appendChild(div);
  }
}

/* 投票監視 */
onValue(voteRef, (snapshot) => {

  const value = snapshot.val() || 0;

  renderLayers(value);

  if (value >= IPPON_THRESHOLD) {

    ipponDisplay.style.display = "block";
    ipponDisplay.style.animation = "none";
    void ipponDisplay.offsetWidth;
    ipponDisplay.style.animation = "pop 0.3s ease forwards";

    setTimeout(() => {
      ipponDisplay.style.display = "none";
      document.querySelectorAll(".layer").forEach(el => el.remove());
      set(voteRef, 0);
    }, 3000);
  }
});
</script>

</body>
</html>
